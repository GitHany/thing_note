version: 1
plan:
  name: "thing_note Flutter 静态分析修复"
  max_concurrency: 4
  max_consecutive_failures: 3
  max_cycles: 10
tasks:
  - id: fix-futureprovider
    title: "修复 FutureProvider 使用错误"
    prompt: |
      修复 C:\code\thing_note\thing_note 项目中所有 repository 文件的 FutureProvider 使用错误。
      
      问题原因: databaseProvider 是 FutureProvider<Database> 类型，但代码中直接 await databaseProvider，
      导致 FutureProvider 被当作 Future 使用。
      
      需要修复的文件（约20+个）:
      - lib/features/meal_planner/data/meal_plan_repository.dart
      - lib/features/screen_time/data/screen_time_repository.dart
      - lib/features/achievement/data/achievement_repository.dart
      - lib/features/clothing_inventory/data/clothing_repository.dart
      - lib/features/subscription_manager/data/subscription_repository.dart
      - lib/features/vehicle_tracker/data/vehicle_repository.dart
      - lib/features/warranty_tracker/data/warranty_repository.dart
      - 以及其他所有有同样问题的 repository
      
      解决方案: 将 `final db = await databaseProvider;` 改为 `final db = await databaseProvider.future;`
      
      每个文件都需要:
      1. 读取文件内容
      2. 找到所有 `await databaseProvider` 的用法
      3. 替换为 `await databaseProvider.future`
      4. 保存文件
      
      完成后运行 flutter analyze 验证修复效果。
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      验证所有 FutureProvider 错误已修复。
      1. 检查修复的文件数量是否 >= 20
      2. 运行 flutter analyze 确认 FutureProvider 相关错误减少
      3. 检查是否还有其他遗漏的 await databaseProvider 用法
    timeout_ms: 1800000
  
