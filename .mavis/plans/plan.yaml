  - id: flow-state-tracker
    title: '实现 Flow State Tracker 功能'
    prompt: |
      在 C:\code\thing_note\thing_note 项目中实现 Flow State Tracker 功能。

      功能需求：
      - 深度工作/心流状态追踪系统
