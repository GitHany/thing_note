name: thing_note
description: A note-taking app for tracking daily events
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  sqflite: ^2.3.0
  go_router: ^14.0.0
  image_picker: ^1.0.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.0
  path: ^1.9.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  intl: ^0.19.0
  uuid: ^4.3.0
  flutter_sound: ^9.16.3
  share_plus: ^10.0.0
  open_filex: ^4.4.0
  archive: ^3.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
