  - id: fix-repo-db
    title: '修复 repository 数据库访问问题'
    prompt: '修复 C:\code\thing_note\thing_note 项目中所有新扩展功能的 repository 文件数据库访问问题。所有 *_repository.dart 文件（data层）需要：
1. 添加 import package:flutter_riverpod/flutter_riverpod.dart
2. 添加 final Ref _ref; 字段
3. 构造函数改为接收 Ref: XxxRepository(this._ref)
4. 把 await databaseProvider.future 改为 await _ref.read(databaseProvider.future)
5. 修改对应的 provider 文件传递 ref

